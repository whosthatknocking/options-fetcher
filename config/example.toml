[settings]
tickers = ["TSLA", "NVDA", "UBER", "MSFT", "GOOGL", "ORCL", "PLTR"]
data_provider = "yfinance"
# Keep false to fail fast when a paid provider is selected without credentials.
# Set true only when you intentionally want yfinance fallback for missing paid-provider credentials.
auto_fallback_to_yfinance = false

# Optional portfolio positions input:
# Place a Fidelity-format export at $XDG_DATA_HOME/opx-chain/positions.csv
# (defaulting to ~/.local/share/opx-chain/positions.csv) when you want
# position-aware ticker expansion, same-day expiration retention, and post-download filter bypass.

# Shared filtering
# Omit filters_min_bid to disable this optional screen; TOML has no null literal.
# filters_min_bid = 0.50
filters_min_open_interest = 100
filters_min_volume = 10
filters_max_spread_pct_of_mid = 0.25
filters_max_strike_distance_pct = 0.35
filters_enable = true

# Shared analytics and freshness
risk_free_rate = 0.045
hv_lookback_days = 30
trading_days_per_year = 252
stale_quote_seconds = 10800
max_expiration_weeks = 34

# Shared viewer runtime
viewer_host = "127.0.0.1"
viewer_port = 8000

# Shared scoring
option_score_income_weight = 0.30
option_score_liquidity_weight = 0.30
option_score_risk_weight = 0.25
option_score_efficiency_weight = 0.15

# Shared diagnostics
enable_validation = true
debug_dump_provider_payload = false
debug_dump_dir = "debug"  # resolved under $XDG_DATA_HOME/opx-chain/

[storage]
# Set enable = true to activate the storage port for pipeline integration.
# When disabled (default), the existing filesystem write path is used unchanged.
enable = false
# Optional base data directory override. Relative values resolve under $XDG_DATA_HOME/opx-chain/.
# dir = "data"
backend = "filesystem"   # "filesystem" | "sqlite" (when enable = true)
max_runs_retained = 0  # 0 = keep all datasets; positive integer = keep last N
cache_backend = "none"  # "none" | "filesystem"
cache_dir = "cache"     # resolved under $XDG_CACHE_HOME/opx-chain/

[providers.yfinance]
# Optional client-side pacing/retry controls for Yahoo Finance traffic.
request_interval_seconds = 0.0
max_retries = 0
backoff_seconds = 1.0

[providers.massive]
api_key = "replace-me"
snapshot_page_limit = 250
request_interval_seconds = 12.0
max_retries = 3
backoff_seconds = 1.0

[providers.marketdata]
api_token = "replace-me"
# Optional: uncomment to force "live", "cached", or "delayed" mode.
# If omitted, the SDK/account default applies.
# mode = "delayed"
max_retries = 3
request_interval_seconds = 0.0
backoff_seconds = 1.0
